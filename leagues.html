<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Football | Nobipur Sports Union</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50 flex flex-col min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-screen-xl mx-auto px-4 md:px-6 py-4 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-x-2 shrink-0">
                <img src="logo.png" alt="Logo" class="h-8 w-auto md:h-10 object-contain">
                <div>
                    <div class="font-bold text-base md:text-xl text-slate-800 whitespace-nowrap">নবীপুর ক্রীড়া সংঘ</div>
                </div>
            </a>
            <div class="hidden md:flex items-center gap-x-7 text-sm font-medium">
                <a href="index.html" class="hover:text-emerald-700">Home</a>
                <a href="international.html" class="hover:text-emerald-700">International</a>
                <a href="leagues.html" class="text-emerald-700 font-bold">Club Football</a>
                <a href="players.html" class="hover:text-emerald-700">Our Players</a>
                <a href="gallery.html" class="hover:text-emerald-700">Gallery</a>
                <a href="about.html" class="hover:text-emerald-700">About</a>
                <a href="contact.html" class="hover:text-emerald-700">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="flex-grow max-w-screen-xl mx-auto px-6 py-12">
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800">ক্লাব ফুটবল আপডেট</h1>
            <p class="text-slate-500 mt-2">ইউরোপ এবং এশিয়ার শীর্ষ লিগগুলোর সাম্প্রতিক ম্যাচের ফলাফল ও বিবরণ</p>
        </div>
        
        <div class="grid md:grid-cols-2 gap-6" id="leagues-container">
            <div class="bg-white border border-slate-200 rounded-3xl p-6 col-span-2 text-center text-slate-500">
                <i class="fa-solid fa-spinner fa-spin text-blue-600 mr-2"></i> ক্লাব ফুটবলের তথ্য লোড হচ্ছে...
            </div>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-400 py-6 text-sm text-center">© 2026 Nobipur Sports Union</footer>

    <script>
        async function loadLeaguesData() {
            const container = document.getElementById('leagues-container');
            try {
                const response = await fetch('https://www.scorebat.com/video-api/v3/feed/');
                const data = await response.json();
                
                if (data && data.response) {
                    let html = '';
                    const clubMatches = data.response.filter(match => {
                        const comp = match.competition.toLowerCase();
                        return comp.includes('premier league') || comp.includes('la liga') || comp.includes('serie a') || comp.includes('champions league') || comp.includes('afc') || comp.includes('saudi') || comp.includes('isl');
                    });

                    if(clubMatches.length > 0) {
                        clubMatches.slice(0, 14).forEach(match => {
                            let videoUrl = "";
                            if(match.videos && match.videos.length > 0) {
                                const srcMatch = match.videos[0].embed.match(/src="([^"]+)"/);
                                if(srcMatch) videoUrl = srcMatch[1];
                            }

                            html += `
                                <div class="bg-white border border-slate-200 rounded-3xl p-6 hover:shadow-md transition flex flex-col justify-between">
                                    <div>
                                        <span class="px-2 py-1 bg-purple-50 text-purple-600 font-bold text-[10px] uppercase rounded-md tracking-wider">${match.competition}</span>
                                        <div class="text-base font-bold text-slate-800 mt-3 mb-2">${match.title}</div>
                                    </div>
                                    <div class="flex justify-between items-center text-xs border-t pt-3 mt-4 text-slate-500">
                                        <span><i class="fa-regular fa-calendar-days mr-1"></i> ${new Date(match.date).toLocaleDateString()}</span>
                                        ${videoUrl ? `<a href="${videoUrl}" target="_blank" class="px-3 py-1 bg-purple-50 text-purple-700 font-semibold rounded-xl hover:bg-purple-100"><i class="fa-solid fa-play mr-1"></i> Highlights</a>` : ''}
                                    </div>
                                </div>
                            `;
                        });
                        container.innerHTML = html;
                    } else {
                        container.innerHTML = `<div class="bg-white border border-slate-200 rounded-3xl p-6 col-span-2 text-center text-slate-400 text-sm">কোনো ক্লাব ফুটবল ম্যাচ পাওয়া যায়নি।</div>`;
                    }
                }
            } catch (error) {
                container.innerHTML = `<div class="bg-white border border-slate-200 rounded-3xl p-6 col-span-2 text-center text-red-500 text-sm">ডেটা লোড করতে সমস্যা হয়েছে।</div>`;
            }
        }
        document.addEventListener('DOMContentLoaded', loadLeaguesData);
    </script>
</body>
</html>
