<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Nobipur Sports Union</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50 flex flex-col min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-screen-xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-emerald-700 text-white rounded-2xl flex items-center justify-center"><i class="fa-solid fa-futbol text-xl"></i></div>
                <div class="font-bold text-xl">নবীপুর ক্রীড়া সংঘ</div>
            </a>
            <div class="hidden md:flex items-center gap-x-7 text-sm font-medium">
                <a href="index.html" class="hover:text-emerald-700">Home</a>
                <a href="players.html" class="hover:text-emerald-700">Our Players</a>
                <a href="gallery.html" class="hover:text-emerald-700">Gallery</a>
                <a href="about.html" class="hover:text-emerald-700">About</a>
                <a href="contact.html" class="text-emerald-700 font-bold">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="flex-grow max-w-screen-xl mx-auto px-6 py-12">
        <div class="max-w-4xl mx-auto grid md:grid-cols-2 gap-12 bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
            <!-- Contact Info -->
            <div>
                <h1 class="text-3xl font-bold text-slate-800 mb-6">যোগাযোগ করুন</h1>
                <p class="text-slate-500 mb-8">ক্লাবে ভর্তি, স্পনসরশিপ বা যেকোনো তথ্যের জন্য আমাদের সাথে সরাসরি যোগাযোগ করতে পারেন।</p>
                
                <div class="space-y-4">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-emerald-50 text-emerald-700 rounded-xl flex items-center justify-center"><i class="fa-solid fa-location-dot"></i></div>
                        <div><p class="text-xs text-slate-400">ঠিকানা</p><p class="text-sm font-semibold text-slate-700">নবীপুর, নীলগঞ্জ, কলাপাড়া, পটুয়াখালী</p></div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-emerald-50 text-emerald-700 rounded-xl flex items-center justify-center"><i class="fa-solid fa-phone"></i></div>
                        <div><p class="text-xs text-slate-400">মোবাইল</p><p class="text-sm font-semibold text-slate-700">+৮৮০১৫৭৫১০৫১৬৯</p></div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-emerald-50 text-emerald-700 rounded-xl flex items-center justify-center"><i class="fa-solid fa-envelope"></i></div>
                        <div><p class="text-xs text-slate-400">ইমেইল</p><p class="text-sm font-semibold text-slate-700">nobipursportsunion@gmail.com</p></div>
                    </div>
                </div>
            </div>

            <!-- Contact Form -->
            <form onsubmit="alert('বার্তা পাঠানো হয়েছে!'); return false;" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">আপনার নাম</label>
                    <input type="text" required class="w-full px-4 py-3 bg-slate-50 border rounded-xl focus:outline-emerald-700 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">ইমেইল / মোবাইল</label>
                    <input type="text" required class="w-full px-4 py-3 bg-slate-50 border rounded-xl focus:outline-emerald-700 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">বার্তা</label>
                    <textarea required rows="4" class="w-full px-4 py-3 bg-slate-50 border rounded-xl focus:outline-emerald-700 text-sm"></textarea>
                </div>
                <button type="submit" class="w-full py-3 bg-emerald-700 text-white font-bold rounded-xl shadow-lg hover:bg-emerald-800 transition">বার্তা পাঠান</button>
            </form>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-400 py-6 text-sm text-center">© 2026 Nobipur Sports Union</footer>
</body>
</html>
