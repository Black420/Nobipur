<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery | Nobipur Sports Union</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50 flex flex-col min-h-screen">

      <!-- রেসপন্সিভ নেভিগেশন বার (সব পেজের জন্য) -->
<nav class="bg-white border-b sticky top-0 z-50">
    <div class="max-w-screen-xl mx-auto px-4 md:px-6 py-4 flex items-center justify-between">
        <!-- লগো এবং টাইটেল -->
        <a href="index.html" class="flex items-center gap-x-2 shrink-0">
            <img src="logo.png" alt="Logo" class="h-8 w-auto md:h-10 object-contain">
            <div>
                <div class="font-bold text-base md:text-xl text-slate-800 whitespace-nowrap">নবীপুর ক্রীড়া সংঘ</div>
            </div>
        </a>

        <!-- ডেস্কটপ মেনু (বড় স্ক্রিনের জন্য) -->
        <div class="hidden md:flex items-center gap-x-7 text-sm font-medium">
            <a href="index.html" class="hover:text-emerald-700">Home</a>
            <a href="local.html" class="hover:text-emerald-700">Local Tournaments</a>
            <a href="international.html" class="hover:text-emerald-700">International</a>
            <a href="leagues.html" class="hover:text-emerald-700">Club Football</a>
            <a href="players.html" class="hover:text-emerald-700">Our Players</a>
            <a href="gallery.html" class="hover:text-emerald-700">Gallery</a>
            <a href="about.html" class="hover:text-emerald-700">About</a>
            <a href="contact.html" class="hover:text-emerald-700">Contact</a>
        </div>

        <!-- মোবাইল মেনু বাটন (হামবুর্গার আইকন) -->
        <button id="menu-btn" class="md:hidden text-slate-700 hover:text-emerald-700 focus:outline-none p-2">
            <i class="fa-solid fa-bars text-xl"></i>
        </button>
    </div>

    <!-- মোবাইল ড্রপডাউন মেনু (ডিফল্টভাবে হাইড থাকবে) -->
    <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-slate-100 px-4 py-3 space-y-3 font-medium text-sm text-slate-700 shadow-lg">
        <a href="index.html" class="block py-2 hover:text-emerald-700 border-b border-slate-50">Home</a>
        <a href="local.html" class="block py-2 hover:text-emerald-700 border-b border-slate-50">Local Tournaments</a>
        <a href="international.html" class="block py-2 hover:text-emerald-700 border-b border-slate-50">International</a>
        <a href="leagues.html" class="block py-2 hover:text-emerald-700 border-b border-slate-50">Club Football</a>
        <a href="players.html" class="block py-2 hover:text-emerald-700 border-b border-slate-50">Our Players</a>
        <a href="gallery.html" class="block py-2 hover:text-emerald-700 border-b border-slate-50">Gallery</a>
        <a href="about.html" class="block py-2 hover:text-emerald-700 border-b border-slate-50">About</a>
        <a href="contact.html" class="block py-2 hover:text-emerald-700">Contact</a>
    </div>
</nav>

    <!-- Content -->
    <main class="flex-grow max-w-screen-xl mx-auto px-6 py-12">
        <h1 class="text-3xl font-bold text-slate-800 mb-8 text-center">ক্লাব মেমোরিজ (Gallery)</h1>
        
        <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
            <div class="aspect-video rounded-2xl overflow-hidden border border-slate-200 bg-white"><img src="https://picsum.photos/id/1016/600/400" class="w-full h-full object-cover hover:scale-105 transition duration-300"></div>
            <div class="aspect-video rounded-2xl overflow-hidden border border-slate-200 bg-white"><img src="https://picsum.photos/id/1005/600/400" class="w-full h-full object-cover hover:scale-105 transition duration-300"></div>
            <div class="aspect-video rounded-2xl overflow-hidden border border-slate-200 bg-white"><img src="https://picsum.photos/id/160/600/400" class="w-full h-full object-cover hover:scale-105 transition duration-300"></div>
            <div class="aspect-video rounded-2xl overflow-hidden border border-slate-200 bg-white"><img src="https://picsum.photos/id/201/600/400" class="w-full h-full object-cover hover:scale-105 transition duration-300"></div>
            <div class="aspect-video rounded-2xl overflow-hidden border border-slate-200 bg-white"><img src="https://picsum.photos/id/251/600/400" class="w-full h-full object-cover hover:scale-105 transition duration-300"></div>
            <div class="aspect-video rounded-2xl overflow-hidden border border-slate-200 bg-white"><img src="https://picsum.photos/id/29/600/400" class="w-full h-full object-cover hover:scale-105 transition duration-300"></div>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-400 py-6 text-sm text-center">© 2026 Nobipur Sports Union</footer>
    <script>
    // মোবাইল মেনু ওপেন/ক্লোজ করার লজিক
    const menuBtn = document.getElementById('menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');

    if (menuBtn && mobileMenu) {
        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
            
            // আইকন চেঞ্জ করার জন্য (টগল করার সময় বার্স থেকে ক্রস আইকন হবে)
            const icon = menuBtn.querySelector('i');
            if (mobileMenu.classList.contains('hidden')) {
                icon.className = 'fa-solid fa-bars text-xl';
            } else {
                icon.className = 'fa-solid fa-xmark text-xl';
            }
        });
    }
</script>

</body>
</html>
